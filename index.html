<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Post erstellen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
p.sub { font-size: 14px; color: #666; margin-bottom: 32px; }
label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
textarea { width: 100%; border: 1.5px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: inherit; color: #333; resize: vertical; min-height: 120px; margin-bottom: 28px; outline: none; }
textarea:focus { border-color: #555; }
textarea::placeholder { color: #aaa; }
button { width: 100%; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; }
button:hover { background: #333; }
button:disabled { background: #999; cursor: not-allowed; }
.status { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.loading { background: #f5f5f5; color: #555; border: 1px solid #e5e5e5; }
</style>
</head>
<body>
<div class="card">
  <h1>Social Media Post erstellen</h1>
  <p class="sub">Beschreibe die Maschine – KI erstellt den Post-Text automatisch.</p>
  <label>Beschreibung der Maschine *</label>
  <textarea id="text" placeholder="z.B. Fuchs F800 Hoflader, Baujahr 2022, Neuankunft, Sonderpreis diese Woche"></textarea>
  <button id="btn" onclick="senden()">Post erstellen →</button>
  <div class="status" id="status"></div>
</div>
<script>
async function senden() {
  const text = document.getElementById('text').value.trim();
  if (!text) { zeig('Bitte eine Beschreibung eingeben.', 'error'); return; }
  document.getElementById('btn').disabled = true;
  zeig('KI erstellt den Post-Text...', 'loading');
  try {
    const r = await fetch('https://hook.eu1.make.com/9v6d4gmsk3cy2i7906qjc8poixvpkjv1', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: text, zeitstempel: new Date().toISOString() })
    });
    if (r.ok) {
      zeig('✅ Erfolgreich! KI erstellt jetzt den Post-Text.', 'success');
      document.getElementById('text').value = '';
    } else {
      zeig('Fehler beim Senden. Bitte nochmal versuchen.', 'error');
    }
  } catch(e) {
    zeig('Verbindungsfehler: ' + e.message, 'error');
  }
  document.getElementById('btn').disabled = false;
}
function zeig(msg, cls) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status ' + cls; s.style.display = 'block';
}
</script>
</body>
</html>
