<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Post erstellen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  p.sub {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    margin-bottom: 8px;
  }
  .upload-area {
    border: 2px dashed #ddd;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 24px;
    position: relative;
  }
  .upload-area:hover { border-color: #666; }
  .upload-area.has-file { border-color: #22c55e; background: #f0fdf4; }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: #666; }
  .upload-text strong { color: #333; }
  #preview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }
  textarea {
    width: 100%;
    border: 1.5px solid #e5e5e5;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    color: #333;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 28px;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #555; }
  textarea::placeholder { color: #aaa; }
  button {
    width: 100%;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    display: none;
  }
  .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .status.loading { background: #f5f5f5; color: #555; border: 1px solid #e5e5e5; }
</style>
</head>
<body>
<div class="card">
  <h1>Social Media Post erstellen</h1>
  <p class="sub">Bild hochladen – KI erstellt den Text automatisch.</p>

  <label>Foto der Maschine *</label>
  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept="image/*" required>
    <div class="upload-icon">📷</div>
    <div class="upload-text"><strong>Foto auswählen</strong> oder hierher ziehen</div>
    <img id="preview" alt="Vorschau">
  </div>

  <label>Kurze Notiz (optional)</label>
  <textarea id="notiz" placeholder="z.B. Sonderangebot diese Woche · Baujahr 2022 · Neuankunft"></textarea>

  <button id="submitBtn" onclick="absenden()">Post erstellen →</button>
  <div class="status" id="status"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');

fileInput.addEventListener('change', function() {
  if (this.files && this.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.classList.add('has-file');
      uploadArea.querySelector('.upload-icon').textContent = '✅';
      uploadArea.querySelector('.upload-text').innerHTML = '<strong>' + this.files[0].name + '</strong>';
    };
    reader.readAsDataURL(this.files[0]);
  }
});

async function absenden() {
  const file = fileInput.files[0];
  if (!file) {
    zeigStatus('Bitte zuerst ein Foto auswählen.', 'error');
    return;
  }

  submitBtn.disabled = true;
  zeigStatus('Wird gesendet...', 'loading');

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result;
    const notiz = document.getElementById('notiz').value;

    const payload = {
      bild_base64: base64,
      bild_name: file.name,
      bild_typ: file.type,
      notiz: notiz,
      zeitstempel: new Date().toISOString()
    };

    try {
      const response = await fetch('https://hook.eu1.make.com/9v6d4gmsk3cy2i7906qjc8poixvpkjv1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        zeigStatus('✅ Erfolgreich gesendet! Die KI erstellt jetzt den Post-Text.', 'success');
        submitBtn.disabled = false;
        fileInput.value = '';
        preview.style.display = 'none';
        uploadArea.classList.remove('has-file');
        uploadArea.querySelector('.upload-icon').textContent = '📷';
        uploadArea.querySelector('.upload-text').innerHTML = '<strong>Foto auswählen</strong> oder hierher ziehen';
        document.getElementById('notiz').value = '';
      } else {
        zeigStatus('Fehler beim Senden. Bitte nochmal versuchen.', 'error');
        submitBtn.disabled = false;
      }
    } catch (err) {
      zeigStatus('Verbindungsfehler. Bitte Internetverbindung prüfen.', 'error');
      submitBtn.disabled = false;
    }
  };
  reader.readAsDataURL(file);
}

function zeigStatus(msg, typ) {
  status.textContent = msg;
  status.className = 'status ' + typ;
  status.style.display = 'block';
}
</script>
</body>
</html>
