<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Post erstellen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 32px; }
  label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
  .upload-area {
    border: 2px dashed #ddd;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 24px;
    position: relative;
  }
  .upload-area:hover { border-color: #666; }
  .upload-area.has-file { border-color: #22c55e; background: #f0fdf4; }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: #666; }
  .upload-text strong { color: #333; }
  #preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 12px; display: none; }
  textarea {
    width: 100%;
    border: 1.5px solid #e5e5e5;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    color: #333;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 28px;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #555; }
  textarea::placeholder { color: #aaa; }
  button {
    width: 100%;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    display: none;
  }
  .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .status.loading { background: #f5f5f5; color: #555; border: 1px solid #e5e5e5; }
</style>
</head>
<body>
<div class="card">
  <h1>Social Media Post erstellen</h1>
  <p class="sub">Bild hochladen – KI erstellt den Text automatisch.</p>

  <label>Foto der Maschine *</label>
  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept="image/*" required>
    <div class="upload-icon">📷</div>
    <div class="upload-text"><strong>Foto auswählen</strong> oder hierher ziehen</div>
    <img id="preview" alt="Vorschau">
  </div>

  <label>Kurze Notiz (optional)</label>
  <textarea id="notiz" placeholder="z.B. Sonderangebot diese Woche · Baujahr 2022 · Neuankunft"></textarea>

  <button id="submitBtn" onclick="absenden()">Post erstellen →</button>
  <div class="status" id="status"></div>
</div>

<script>
const IMGBB_KEY = '9e80478f8e2bdbb43d5e9b6857a7c7c2';
const MAKE_WEBHOOK = 'https://hook.eu1.make.com/9v6d4gmsk3cy2i7906qjc8poixvpkjv1';

const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');

fileInput.addEventListener('change', function() {
  if (this.files && this.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.classList.add('has-file');
      uploadArea.querySelector('.upload-icon').textContent = '✅';
      uploadArea.querySelector('.upload-text').innerHTML = '<strong>' + this.files[0].name + '</strong>';
    };
    reader.readAsDataURL(this.files[0]);
  }
});

async function absenden() {
  const file = fileInput.files[0];
  if (!file) { zeigStatus('Bitte zuerst ein Foto auswählen.', 'error'); return; }

  submitBtn.disabled = true;
  zeigStatus('Bild wird hochgeladen...', 'loading');

  try {
    const base64 = await toBase64(file);
    const base64Data = base64.split(',')[1];

    const formData = new FormData();
    formData.append('key', IMGBB_KEY);
    formData.append('image', base64Data);

    const imgRes = await fetch('https://api.imgbb.com/1/upload', {
      method: 'POST',
      body: formData
    });
    const imgData = await imgRes.json();

    if (!imgData.success) throw new Error('Bild-Upload fehlgeschlagen');

    const bildUrl = imgData.data.url;
    zeigStatus('KI erstellt den Post-Text...', 'loading');

    const payload = {
      bild_url: bildUrl,
      bild_name: file.name,
      notiz: document.getElementById('notiz').value,
      zeitstempel: new Date().toISOString()
    };

    const makeRes = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (makeRes.ok) {
      zeigStatus('✅ Erfolgreich! KI erstellt jetzt den Post-Text.', 'success');
      fileInput.value = '';
      preview.style.display = 'none';
      uploadArea.classList.remove('has-file');
      uploadArea.querySelector('.upload-icon').textContent = '📷';
      uploadArea.querySelector('.upload-text').innerHTML = '<strong>Foto auswählen</strong> oder hierher ziehen';
      document.getElementById('notiz').value = '';
    } else {
      throw new Error('Make.com Fehler');
    }
  } catch(err) {
    zeigStatus('Fehler: ' + err.message + '. Bitte nochmal versuchen.', 'error');
  }
  submitBtn.disabled = false;
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function zeigStatus(msg, typ) {
  status.textContent = msg;
  status.className = 'status ' + typ;
  status.style.display = 'block';
}
</script>
</body>
</html>
